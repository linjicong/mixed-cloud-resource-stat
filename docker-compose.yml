version: '3.8'

services:
  backend:
    image: ${ACR_REGISTRY}/${ACR_NAMESPACE}/mixed-cloud-backend:latest
    container_name: cloud-stat-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
    networks:
      - cloud-stat

  frontend:
    image: ${ACR_REGISTRY}/${ACR_NAMESPACE}/mixed-cloud-frontend:latest
    container_name: cloud-stat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cloud-stat

networks:
  cloud-stat:
    driver: bridge
